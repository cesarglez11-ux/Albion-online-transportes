name: Build and Release

# Se dispara cada vez que subes un tag como v1.0.0, v1.1.0, etc.
#   git tag v1.0.0
#   git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: AlbionCargoTerminal.exe
            asset_name: AlbionCargoTerminal-Windows.exe
          - os: macos-latest
            artifact_name: AlbionCargoTerminal
            asset_name: AlbionCargoTerminal-macOS
          - os: ubuntu-latest
            artifact_name: AlbionCargoTerminal
            asset_name: AlbionCargoTerminal-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compilar ejecutable
        run: >
          pyinstaller --onefile --windowed --name AlbionCargoTerminal
          --collect-all customtkinter
          albion_cargo_app.py

      - name: Renombrar artefacto
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "dist/${{ matrix.artifact_name }}" "out/${{ matrix.asset_name }}"
          else
            cp "dist/${{ matrix.artifact_name }}" "out/${{ matrix.asset_name }}"
          fi

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: out/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Descargar todos los artefactos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Crear Release con los 3 ejecutables
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
